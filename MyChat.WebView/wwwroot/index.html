<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MyChat WebView</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Segoe UI, Arial, sans-serif; background: #f5f7fb; }
    #root { display: grid; grid-template-rows: 32px 1fr auto; height: 100vh; }
    #header { background: #244179; color: #fff; display: flex; align-items: center; padding: 0 12px; font-size: 13px; font-weight: 600; }
    #messages { overflow: auto; padding: 12px; background: #f5f7fb; display: flex; flex-direction: column; gap: 12px; }
    .message-item { max-width: min(72%, 640px); min-height: 24px; display: flex; flex-direction: column; }
    .message-item.incoming { align-self: flex-start; }
    .message-item.outgoing { align-self: flex-end; }
    .message-meta { font-size: 12px; color: #4d5867; margin-bottom: 6px; font-weight: 600; }
    .message-bubble { border: 1px solid #c8d2e2; background: #fff; border-radius: 8px; padding: 10px 12px; color: #22272e; line-height: 1.4; white-space: pre-wrap; word-break: break-word; }
    .message-item.outgoing .message-bubble { background: #dceeff; }
    .attachment-list { margin-top: 8px; padding-top: 8px; border-top: 1px solid #d8e0ec; display: flex; flex-direction: column; gap: 6px; }
    .attachment-link { text-decoration: none; color: #244179; border: 1px solid #c8d2e2; border-radius: 6px; padding: 6px 8px; background: #ffffffc7; font-size: 12px; }
    #inputBar { display: grid; grid-template-columns: 1fr 42px 90px; gap: 6px; padding: 8px 12px; background: #fff; border-top: 1px solid #dce2ea; }
    #input { border: 1px solid #c8d2e2; border-radius: 6px; padding: 8px 10px; font-size: 14px; }
    #input:focus { outline: 2px solid #88a6d8; border-color: #88a6d8; }
    #send { border: 0; border-radius: 6px; background: #244179; color: white; font-weight: 700; cursor: pointer; }
    #send:hover { background: #1e3665; }
    #send:disabled { background: #a7b7d3; cursor: not-allowed; }
  </style>
</head>
<body>
  <div id="root">
    <div id="header">Chat (WebView2)</div>
    <div id="messages"></div>
    <div id="inputBar">
      <input id="input" type="text" placeholder="Nachricht ..." />
      <button id="send">➤</button>
      <button id="reload">Reload</button>
    </div>
  </div>

  <script>
    const ui = {
      header: document.getElementById('header'),
      messages: document.getElementById('messages'),
      send: document.getElementById('send'),
      reload: document.getElementById('reload'),
      input: document.getElementById('input')
    };

    let model = null;

    function isOwnMessage(sender) {
      if (!sender) return false;
      if (sender.toLowerCase() === 'ich') return true;
      return !!model?.currentUser && sender.toLowerCase() === model.currentUser.toLowerCase();
    }

    function appendMessage(sender, text, timestamp, attachments = []) {
      const outgoing = isOwnMessage(sender);
      const row = document.createElement('div');
      row.className = `message-item ${outgoing ? 'outgoing' : 'incoming'}`;

      const meta = document.createElement('div');
      meta.className = 'message-meta';
      meta.textContent = `${outgoing ? 'Ich' : sender} · ${timestamp}`;

      const bubble = document.createElement('div');
      bubble.className = 'message-bubble';
      bubble.textContent = text;

      if (attachments.length) {
        const attachmentList = document.createElement('div');
        attachmentList.className = 'attachment-list';
        attachments.forEach((fileName) => {
          const attachmentLink = document.createElement('a');
          attachmentLink.href = '#';
          attachmentLink.className = 'attachment-link';
          attachmentLink.textContent = `📎 ${fileName}`;
          attachmentList.appendChild(attachmentLink);
        });
        bubble.appendChild(attachmentList);
      }

      row.appendChild(meta);
      row.appendChild(bubble);
      ui.messages.appendChild(row);
      ui.messages.scrollTop = ui.messages.scrollHeight;
    }

    ui.send.addEventListener('click', () => {
      const text = ui.input.value.trim();
      if (!text) return;
      const timestamp = new Date().toLocaleString('de-DE', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });
      appendMessage(model?.currentUser || 'Ich', text, timestamp);
      ui.input.value = '';
      ui.send.disabled = true;
    });

    ui.input.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && !ui.send.disabled) {
        ui.send.click();
      }
    });

    ui.input.addEventListener('input', () => {
      ui.send.disabled = ui.input.value.trim().length === 0;
    });

    ui.send.disabled = true;

    ui.reload.addEventListener('click', () => {
      if (window.chrome?.webview?.hostObjects?.chatBridge) {
        window.chrome.webview.hostObjects.chatBridge.NotifyReloadRequested();
      }
    });

    window.chatInterop = {
      applySettings(config) {
        if (!config) return;
        if (config.headerHeight) {
          document.getElementById('root').style.gridTemplateRows = `${config.headerHeight}px 1fr 40px`;
        }
        if (config.rowHeight) {
          const style = document.createElement('style');
          style.innerHTML = `.message-item { min-height: ${config.rowHeight}px; }`;
          document.head.appendChild(style);
        }
        if (config.model) {
          model = config.model;
          ui.header.textContent = `Chat (WebView2) | ${model.objectType}/${model.recordId} | User: ${model.currentUser}`;
        }
      },
      addMessage(payload) {
        appendMessage(payload.sender, payload.text, payload.time, payload.attachments || []);
      }
    };
  </script>
</body>
</html>
